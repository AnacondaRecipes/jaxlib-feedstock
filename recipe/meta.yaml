{% set name = 'jaxlib' %}
{% set version = "0.9.2" %}
{% set build = 0 %}

{% if cuda_compiler_version != "None" %}
{% set build = build + 200 %}
{% endif %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # Only pull sources after upstream PyPI release
  url: https://github.com/jax-ml/jax/archive/jax-v{{ version }}.tar.gz
  sha256: 9e67faaa74be4539e397fe61317568545f9ea325ddf1f7f534929d508786f29e
  patches:
    - patches/0001-Allow-for-custom-CUDA-build.patch
    # XLA unvendoring patches for Linux and macOS
    - patches/0002-Consolidated-build-fixes-for-XLA.patch  # [unix]
    - patches/0003-avoid-mirror-that-doesn-t-seem-to-have-current-xla-a.patch
    - patches/0004-re-enable-use_fast_cpp_protos-true.patch

build:
  number: {{ build }}
  # https://github.com/jax-ml/jax?tab=readme-ov-file#supported-platforms
  skip: true  # [py<311]
  skip: true  # [cuda_compiler_version != "None" and osx]
  # Windows: temporarily skipped to save PBP resources while iterating on
  # the linux build. Will re-enable once linux is green. SIR-2621 (PBP win
  # symlink failures) is resolved upstream so re-enabling is just a recipe edit.
  skip: true  # [win]
  string: cuda{{ cuda_compiler_version | replace('.', '') }}py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version != "None"]
  string: cpu_py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}  # [cuda_compiler_version == "None"]

requirements:
  build:
    # Make sure we use GCC 14 and libstdc++ 14 for CUDA builds on Linux
    - libgcc-ng 14                           # [cuda_compiler_version != "None" and linux]
    - libstdcxx-ng 14                        # [cuda_compiler_version != "None" and linux]
    - libgcc-devel_{{ target_platform }} 14  # [cuda_compiler_version != "None" and linux]
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}          # [cuda_compiler_version != "None"]
    - rsync                           # [cuda_compiler_version != "None"]
    - unzip                           # [unix]
    - bazel 7.*
    # pkgs/main maxes out at 0.4.1; conda-forge has >=0.5.8 but they're on
    # a different channel. 0.4.1 is what 0.7.2 shipped with.
    - bazel-toolchain >=0.4.1         # [unix]
    # need protoc
    - libprotobuf                     # [unix]
    # XLA system_lib BUILD links against $(BUILD_PREFIX)/lib/libprotobuf.a
    - libprotobuf-static              # [unix]
    # needs protoc-gen-grpc
    - libgrpc                         # [unix]
    # needs flatc
    - flatbuffers                     # [unix]
    # list libabseil here to ensure pinning correctly
    - libabseil                       # [unix]
    - sed                             # [unix]
  host:
    {% if cuda_compiler_version != "None" %}
    - cuda-cudart-dev
    - cuda-cupti-dev
    - cuda-nvcc-tools
    - cuda-nvml-dev
    - cuda-nvtx-dev
    - cuda-version {{ cuda_compiler_version }}
    - cudnn
    - libcublas-dev
    - libcufft-dev
    - libcurand-dev
    - libcusolver-dev
    - libcusparse-dev
    - nccl
    {% endif %}
    - python
    - pip
    - numpy >=2.0
    - setuptools
    - wheel
    - python-build
    # list libabseil here to ensure pinning correctly
    - libabseil {{ libabseil }}       # [unix]
    - libprotobuf-static              # [unix]
    - flatbuffers                     # [unix]
    - grpc-bazel-rules {{ libgrpc }}  # [unix]
    - libgrpc {{ libgrpc }}           # [unix]
    # jaxlib 0.9.x XLA's protobuf_impl.bzl reads protobuf bazel rules from
    # ${PREFIX}/share/bazel/protobuf/bazel via the PROTOBUF_BAZEL_DIR env var.
    - protobuf-bazel-rules            # [unix]
    # XLA's system_lib BUILD for re2 (added by patch 0002) expects re2 in host
    - re2                             # [unix]
    - openssl {{ openssl }}           # [unix]
    - zlib {{ zlib }}                 # [unix]
  run:
    # https://github.com/jax-ml/jax/blob/jax-v{{ version }}/jaxlib/setup.py
    - python
    - scipy >=1.13
    - numpy >=2.0
    - ml_dtypes >=0.5.0
    {% if cuda_compiler_version != "None" %}
    - __cuda
    - cuda-nvcc-tools
    # Workaround for https://github.com/conda-forge/jaxlib-feedstock/pull/288#issuecomment-2511925904
    - cuda-cupti-dev
    - libcublas-dev
    - libcufft-dev
    - libcurand-dev
    - libcusolver-dev
    - libcusparse-dev
    {% endif %}
  run_constrained:
    - jax >={{ version }}

test:
  requires:
    - pip
  files:
    - test_jaxlib.py
  imports:
    - jaxlib
    # Only this import actually triggers the load of XLA
    - jaxlib.xla_client
  commands:
    - pip check
    - python test_jaxlib.py
    - python -c "import importlib.metadata; assert importlib.metadata.version('jaxlib') == '{{ version }}'"
    # ensure that the package metadata did not mangle in the git hash, see #274
    - test -f $SP_DIR/jaxlib-{{ version }}.dist-info/METADATA  # [unix]
    - if not exist "%SP_DIR%\jaxlib-{{ version }}.dist-info\METADATA" exit 1  # [win]

about:
  home: https://github.com/jax-ml/jax
  license_file: LICENSE
  license: Apache-2.0
  license_family: Apache
  summary: Composable transformations of Python+NumPy programs - differentiate, vectorize, JIT to GPU/TPU, and more
  description: |
    JAX is a Python library for accelerator-oriented array computation and program transformation, designed for
    high-performance numerical computing and large-scale machine learning.
  dev_url: https://github.com/jax-ml/jax
  doc_url: https://docs.jax.dev

extra:
  recipe-maintainers:
    - ehfd
    - ericmjl
    - xhochy
    - ngam
    - h-vetinari
